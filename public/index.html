<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover"
		/>
		<title>glub chat</title>

		<link rel="icon" type="image/png" href="/glub.png" />
		<link rel="apple-touch-icon" href="/glub.png" />

		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<link rel="stylesheet" href="/css/style.css" />
	</head>

	<body>
		<div id="app">
			<div id="nameGate" class="gate">
				<div class="gateCard">
					<div class="gateTitle" data-i18n="name_gate.title">enter a name</div>
					<div class="gateSub">
						<span data-i18n="name_gate.subtitle_1">no accounts. no emails. no servers.</span><br />
						<span data-i18n="name_gate.subtitle_2">just pick a name to start chatting.</span>
					</div>

					<form id="nameForm" autocomplete="off">
						<div class="nameInputWrap">
							<input
								id="nameInput"
								type="text"
								maxlength="24"
								spellcheck="false"
								autocapitalize="none"
								autocorrect="off"
								autocomplete="off"
								placeholder="alias"
								data-i18n-placeholder="name_gate.input_placeholder"
							/>
							<div id="nameHint" class="nameHint" aria-hidden="true"></div>
						</div>
						<button type="submit" data-i18n="name_gate.enter">enter</button>
						<button type="button" id="randomBtn" data-i18n="name_gate.random">random</button>
					</form>
				</div>
			</div>

			<div id="settingsGate" class="gate">
				<div class="gateCard">
					<div class="gateTitle" data-i18n="settings.title">settings</div>
					<div class="gateSub" data-i18n="settings.assist_description">
						server assist pulls deep history and lowers bandwidth via an optional API. your client
						still works fully on its own if it's off or unavailable.
					</div>

					<label class="settingRow" for="assistToggle">
						<span data-i18n="settings.assist_label">server assist</span>
						<input id="assistToggle" type="checkbox" class="assistCheck" />
						<span class="toggleVisual" aria-hidden="true"></span>
					</label>

					<label id="profilesRow" class="settingRow" for="profilesToggle">
						<span data-i18n="settings.profiles_label">nostr profiles</span>
						<input id="profilesToggle" type="checkbox" class="assistCheck" />
						<span class="toggleVisual" aria-hidden="true"></span>
					</label>

					<button id="settingsClose" type="button" data-i18n="settings.done">done</button>
				</div>
			</div>

			<div id="usersGate" class="gate">
				<div class="usersPanel">
					<div class="usersHeader">
						<span id="usersTitle" data-i18n="users.title_default">users</span>
						<strong id="usersClose" class="usersExit" data-i18n="users.exit">[EXIT]</strong>
					</div>
					<div id="usersList" class="usersList"></div>
				</div>
			</div>

			<div id="profileGate" class="gate">
				<div class="gateCard profileCard">
					<img id="profileBanner" class="profileBanner" alt="" hidden />
					<div class="profileHead">
						<img id="profileAvatar" class="profileAvatar" alt="" hidden />
						<div class="profileIdent">
							<div id="profileName" class="profileName"></div>
							<div id="profileNip05" class="profileNip05"></div>
						</div>
					</div>
					<div id="profileAbout" class="profileAbout"></div>
					<button id="profileClose" type="button" data-i18n="profile.close">close</button>
				</div>
			</div>

			<div id="topbar">
				<span id="brand" class="brand"><strong data-i18n="topbar.connecting">CONNECTING...</strong></span>
				<span id="status"><strong data-i18n="topbar.relays">RELAYS</strong>: --/--</span>
			</div>

			<div id="terminal"></div>

			<div id="composerWrap">
				<div id="newMessagesBar" hidden>[ 0 new messages ]</div>
				<div id="suggestBox" hidden></div>

				<div id="inputbar">
					<button id="mediaBtn" type="button" hidden>+</button>
					<input id="mediaFile" type="file" accept="image/*" hidden />
					<input id="chatInput" type="text" enterkeyhint="send" spellcheck="true" autocomplete="off" placeholder="#channel message..." data-i18n-placeholder="composer.placeholder_global" />
					<button id="sendBtn" type="button" data-i18n="composer.send">send</button>
				</div>
			</div>
		</div>

		<script type="module" src="/js/app.js"></script>
	</body>
</html>
