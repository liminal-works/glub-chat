<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover"
		/>
		<title>glub chat</title>

		<link rel="icon" type="image/png" href="/glub.png" />
		<link rel="apple-touch-icon" href="/glub.png" />

		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<link rel="stylesheet" href="/css/style.css" />
	</head>

	<body>
		<div id="app">
			<div id="nameGate" class="gate">
				<div class="gateCard">
					<div class="gateTitle">enter a name</div>
					<div class="gateSub">no accounts. no emails. no servers.<br />just pick a name to start chatting.</div>

					<form id="nameForm" autocomplete="off">
						<div class="nameInputWrap">
							<input
								id="nameInput"
								type="text"
								maxlength="24"
								spellcheck="false"
								autocapitalize="none"
								autocorrect="off"
								autocomplete="off"
								placeholder="alias"
							/>
							<div id="nameHint" class="nameHint" aria-hidden="true"></div>
						</div>
						<button type="submit">enter</button>
					</form>
				</div>
			</div>

			<div id="settingsGate" class="gate">
				<div class="gateCard">
					<div class="gateTitle">settings</div>
					<div class="gateSub">
						server assist pulls deep history and lowers bandwidth via an optional API. your client
						still works fully on its own if it's off or unavailable.
					</div>

					<label class="settingRow" for="assistToggle">
						<span>server assist</span>
						<input id="assistToggle" type="checkbox" class="switch" />
					</label>

					<button id="settingsClose" type="button">done</button>
				</div>
			</div>

			<div id="topbar">
				<span id="brand" class="brand"><strong>CONNECTING...</strong></span>
				<span id="status"><strong>RELAYS</strong>: --/--</span>
			</div>

			<div id="terminal"></div>

			<div id="composerWrap">
				<div id="newMessagesBar" hidden>[ 0 new messages ]</div>

				<div id="inputbar">
					<input id="chatInput" type="text" enterkeyhint="send" spellcheck="true" autocomplete="off" placeholder="#channel message..." />
					<button id="sendBtn" type="button">send</button>
				</div>
			</div>
		</div>

		<script type="module" src="/js/app.js"></script>
	</body>
</html>
