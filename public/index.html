<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<title>glub chat</title>
		<link rel="stylesheet" href="/css/style.css" />
	</head>

	<body>
		<div id="app">
			<div id="nameGate" class="gate">
				<div class="gateCard">
					<div class="gateTitle">enter a name</div>
					<div class="gateSub">no accounts. no emails. no servers. just pick a name to start chatting.</div>

					<form id="nameForm" autocomplete="off">
						<input
							id="nameInput"
							type="text"
							maxlength="24"
							spellcheck="false"
							autocapitalize="none"
							autocorrect="off"
							autocomplete="off"
							placeholder="alias"
						/>
						<button type="submit">enter</button>
					</form>
				</div>
			</div>

			<div id="topbar">
				<span id="brand" class="brand">CONNECTING...</span>
				<span id="status">RELAYS: --/--</span>
			</div>

			<div id="terminal"></div>

			<div id="inputbar">
				<input id="chatInput" type="text" spellcheck="true" autocomplete="off" placeholder="#channel message" />
				<button id="sendBtn" type="button">send</button>
			</div>
		</div>

		<script type="module" src="/js/app.js"></script>
	</body>
</html>
